<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">MOBaiLE hero graphic</title>
  <desc id="desc">A three-step illustration showing an iPhone prompt, backend execution on your computer, and live results streaming back.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff6eb"/>
      <stop offset="100%" stop-color="#eef7f3"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff2de"/>
      <stop offset="100%" stop-color="#ffe3c1"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffdf6"/>
      <stop offset="100%" stop-color="#f3ecd7"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#edfbf4"/>
      <stop offset="100%" stop-color="#d6f2e4"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#2d2d2d" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="420" rx="30" fill="url(#bg)"/>
  <circle cx="120" cy="74" r="54" fill="#ffd6a8" opacity="0.65"/>
  <circle cx="1080" cy="340" r="64" fill="#d4efe1" opacity="0.8"/>
  <circle cx="1020" cy="80" r="26" fill="#ffe8b7" opacity="0.8"/>

  <text x="70" y="72" fill="#171717" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="700">
    Your computer, in your pocket
  </text>
  <text x="70" y="110" fill="#444444" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18">
    Speak from your phone, run on your own machine, and watch the result come back live.
  </text>

  <rect x="60" y="150" width="300" height="210" rx="24" fill="url(#card1)" filter="url(#shadow)"/>
  <rect x="450" y="150" width="300" height="210" rx="24" fill="url(#card2)" filter="url(#shadow)"/>
  <rect x="840" y="150" width="300" height="210" rx="24" fill="url(#card3)" filter="url(#shadow)"/>

  <text x="90" y="192" fill="#171717" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700">
    1. Ask from your iPhone
  </text>
  <rect x="102" y="218" width="82" height="116" rx="18" fill="#fffdfa" stroke="#171717" stroke-width="3"/>
  <circle cx="143" cy="232" r="5" fill="#171717"/>
  <rect x="115" y="247" width="55" height="12" rx="6" fill="#f5eee3"/>
  <rect x="115" y="267" width="38" height="10" rx="5" fill="#f5eee3"/>
  <rect x="115" y="287" width="46" height="10" rx="5" fill="#f5eee3"/>
  <rect x="199" y="232" width="124" height="54" rx="18" fill="#ffffff" stroke="#d6b88b" stroke-width="2"/>
  <text x="214" y="255" fill="#171717" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">
    fix the failing
  </text>
  <text x="214" y="272" fill="#171717" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">
    test and explain it
  </text>
  <text x="90" y="332" fill="#5a4a34" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">
    Talk or type while walking out of a meeting.
  </text>

  <text x="480" y="192" fill="#171717" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700">
    2. Run on your machine
  </text>
  <rect x="488" y="218" width="224" height="116" rx="18" fill="#171717"/>
  <circle cx="510" cy="236" r="5" fill="#ff8c7d"/>
  <circle cx="527" cy="236" r="5" fill="#ffd166"/>
  <circle cx="544" cy="236" r="5" fill="#7ddf9b"/>
  <text x="510" y="267" fill="#f6f3ec" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
    $ git status
  </text>
  <text x="510" y="288" fill="#f6f3ec" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
    $ pytest -q
  </text>
  <text x="510" y="309" fill="#8be0ad" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
    wrote patch, reran tests
  </text>
  <rect x="666" y="210" width="56" height="28" rx="10" fill="#f3ecd7" stroke="#171717" stroke-width="2"/>
  <text x="679" y="229" fill="#171717" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700">
    SAFE
  </text>
  <text x="480" y="332" fill="#5a5240" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">
    Use your own repo, tools, auth, and network.
  </text>

  <text x="870" y="192" fill="#171717" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700">
    3. Watch progress live
  </text>
  <rect x="878" y="218" width="224" height="116" rx="18" fill="#ffffff" stroke="#9ed4bc" stroke-width="2"/>
  <rect x="896" y="236" width="188" height="18" rx="9" fill="#eff8f3"/>
  <rect x="896" y="261" width="172" height="18" rx="9" fill="#eff8f3"/>
  <rect x="896" y="286" width="156" height="18" rx="9" fill="#eff8f3"/>
  <circle cx="910" cy="245" r="4" fill="#5db48b"/>
  <circle cx="910" cy="270" r="4" fill="#5db48b"/>
  <circle cx="910" cy="295" r="4" fill="#5db48b"/>
  <text x="922" y="249" fill="#1e4330" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">
    reading repo structure
  </text>
  <text x="922" y="274" fill="#1e4330" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">
    rerunning tests
  </text>
  <text x="922" y="299" fill="#1e4330" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">
    finished with summary
  </text>
  <text x="870" y="332" fill="#365949" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">
    See the run, not just the final notification.
  </text>

  <path d="M372 254 C400 254, 410 254, 438 254" fill="none" stroke="#171717" stroke-width="3" stroke-linecap="round"/>
  <path d="M436 246 L450 254 L436 262" fill="none" stroke="#171717" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M762 254 C790 254, 800 254, 828 254" fill="none" stroke="#171717" stroke-width="3" stroke-linecap="round"/>
  <path d="M826 246 L840 254 L826 262" fill="none" stroke="#171717" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
