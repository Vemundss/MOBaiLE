name: VoiceAgentApp
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  VoiceAgentApp:
    type: application
    platform: iOS
    sources:
      - VoiceAgentApp
    dependencies:
      - target: VoiceTaskWidgetExtension
        embed: true
    info:
      path: VoiceAgentApp/Info.plist
      properties:
        CFBundleDisplayName: $(APP_DISPLAY_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: MOBaiLE needs microphone access so you can dictate requests to your paired backend.
        NSSpeechRecognitionUsageDescription: MOBaiLE uses Speech Recognition to turn your spoken request into text before sending it.
        NSLocalNetworkUsageDescription: MOBaiLE can connect to your paired backend on your local network.
        NSCameraUsageDescription: MOBaiLE uses the camera to scan the pairing QR shown on your computer.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            ts.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        ITSAppUsesNonExemptEncryption: false
        MOBaiLEURLScheme: $(MOBAILE_URL_SCHEME)
        CFBundleURLTypes:
          - CFBundleURLName: $(PRODUCT_BUNDLE_IDENTIFIER)
            CFBundleURLSchemes:
              - $(MOBAILE_URL_SCHEME)
    settings:
      base:
        APP_DISPLAY_NAME: MOBaiLE
        MOBAILE_URL_SCHEME: mobaile
        PRODUCT_BUNDLE_IDENTIFIER: com.vemundss.voiceagentapp
        CURRENT_PROJECT_VERSION: 5
        MARKETING_VERSION: 1.0.1
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: G9VZ6PWF3Z
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          APP_DISPLAY_NAME: MOBaiLE Dev
          INFOPLIST_FILE: VoiceAgentApp/Info-Debug.plist
          MOBAILE_URL_SCHEME: mobaile-dev
          PRODUCT_BUNDLE_IDENTIFIER: com.vemundss.voiceagentapp.dev
        Release:
          INFOPLIST_FILE: VoiceAgentApp/Info.plist

  VoiceAgentAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - VoiceAgentAppTests
    dependencies:
      - target: VoiceAgentApp
    info:
      path: VoiceAgentAppTests/Info.plist
      properties:
        CFBundleDisplayName: VoiceAgentAppTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vemundss.voiceagentapp.tests

  VoiceAgentAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - VoiceAgentAppUITests
    dependencies:
      - target: VoiceAgentApp
    info:
      path: VoiceAgentAppUITests/Info.plist
      properties:
        CFBundleDisplayName: VoiceAgentAppUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vemundss.voiceagentapp.uitests
        TEST_TARGET_NAME: VoiceAgentApp

  VoiceTaskWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - VoiceAgentWidget
    info:
      path: VoiceAgentWidget/Info.plist
      properties:
        CFBundleDisplayName: MOBaiLE Widget
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        MOBaiLEURLScheme: $(MOBAILE_URL_SCHEME)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        MOBAILE_URL_SCHEME: mobaile
        PRODUCT_BUNDLE_IDENTIFIER: com.vemundss.voiceagentapp.widget
        CURRENT_PROJECT_VERSION: 5
        MARKETING_VERSION: 1.0.1
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: G9VZ6PWF3Z
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          MOBAILE_URL_SCHEME: mobaile-dev
          PRODUCT_BUNDLE_IDENTIFIER: com.vemundss.voiceagentapp.dev.widget

schemes:
  VoiceAgentApp:
    build:
      targets:
        VoiceAgentApp: all
        VoiceAgentAppTests: [test]
        VoiceAgentAppUITests: [test]
    test:
      targets:
        - VoiceAgentAppTests
        - VoiceAgentAppUITests
