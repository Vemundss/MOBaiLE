name: VoiceAgentApp
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  VoiceAgentApp:
    type: application
    platform: iOS
    sources:
      - VoiceAgentApp
    info:
      path: VoiceAgentApp/Info.plist
      properties:
        CFBundleDisplayName: VoiceAgentApp
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: Voice Agent needs microphone access to record audio and send it to your backend.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vemundss.voiceagentapp
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1,2"

  VoiceAgentAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - VoiceAgentAppTests
    dependencies:
      - target: VoiceAgentApp
    info:
      path: VoiceAgentAppTests/Info.plist
      properties:
        CFBundleDisplayName: VoiceAgentAppTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vemundss.voiceagentapp.tests

schemes:
  VoiceAgentApp:
    build:
      targets:
        VoiceAgentApp: all
        VoiceAgentAppTests: [test]
    test:
      targets:
        - VoiceAgentAppTests
