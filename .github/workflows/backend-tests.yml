name: Backend Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Run Ruff
        working-directory: backend
        run: uvx ruff check app tests

      - name: Run pytest with artifacts
        working-directory: backend
        run: |
          set -euo pipefail
          mkdir -p ../artifacts/backend
          uv run pytest -q --junitxml=../artifacts/backend/pytest-junit.xml | tee ../artifacts/backend/pytest.log

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-artifacts
          path: artifacts/backend
          if-no-files-found: warn
