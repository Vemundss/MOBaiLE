name: Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to upload assets to"
        required: true

permissions:
  contents: write

jobs:
  macos-setup-launcher:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package macOS setup launcher
        run: bash ./scripts/package_macos_setup_launcher.sh

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "release" ]]; then
            printf 'tag=%s\n' "${{ github.event.release.tag_name }}" >> "${GITHUB_OUTPUT}"
          else
            printf 'tag=%s\n' "${{ inputs.tag }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.release.outputs.tag }}" "dist/MOBaiLE-Setup-macOS.zip" --clobber
