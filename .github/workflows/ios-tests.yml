name: iOS Tests

on:
  push:
    branches: [main]
    paths:
      - ios/**
      - contracts/**
      - .github/workflows/ios-tests.yml
  pull_request:
    paths:
      - ios/**
      - contracts/**
      - .github/workflows/ios-tests.yml

jobs:
  test-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select simulator
        id: simulator
        run: |
          set -euo pipefail
          SIM_NAME="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {gsub(/^ +| +$/, "", $1); print $1; exit}')"
          if [ -z "$SIM_NAME" ]; then
            echo "No available iPhone simulator found" >&2
            exit 1
          fi
          echo "name=$SIM_NAME" >> "$GITHUB_OUTPUT"

      - name: Run xcodebuild tests with artifacts
        working-directory: ios
        run: |
          set -euo pipefail
          mkdir -p ../artifacts/ios
          xcodebuild \
            -project VoiceAgentApp.xcodeproj \
            -scheme VoiceAgentApp \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }}" \
            -resultBundlePath ../artifacts/ios/VoiceAgentApp.xcresult \
            test | tee ../artifacts/ios/xcodebuild.log

      - name: Upload iOS test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-artifacts
          path: artifacts/ios
          if-no-files-found: warn
