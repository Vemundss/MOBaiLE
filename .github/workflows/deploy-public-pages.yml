name: Deploy Public Pages

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/deploy-public-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "public-pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare static files
        run: |
          mkdir -p _site
          cp docs/*.html _site/
          cp docs/*.txt _site/ 2>/dev/null || true
          cp docs/*.xml _site/ 2>/dev/null || true
          cp docs/*.css _site/ 2>/dev/null || true
          cp docs/*.png _site/ 2>/dev/null || true
          cp -R docs/readme-screens _site/readme-screens
          cp -R docs/brand _site/brand
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
